name: Release

on:
  release:
    types: [published]

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        run: mvn clean package -DskipTests

      - name: Upload JAR to Release
        run: gh release upload "${{ github.event.release.tag_name }}" target/dicraft-framework-spi-lock-*.jar --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
